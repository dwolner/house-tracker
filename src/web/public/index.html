<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Tracker</title>
    <script>
      // Apply saved theme before render to prevent flash
      if (
        localStorage.getItem("theme") === "dark" ||
        (!localStorage.getItem("theme") &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <header>
      <h1><span class="brand">House Tracker</span><span id="locale-label"> — Main Line</span></h1>
      <div class="header-meta">
        <div>Total: <strong id="stat-total">—</strong></div>
        <div>Fresh (≤7 DOM): <strong id="stat-fresh">—</strong></div>
        <div>Last poll: <strong id="stat-poll">—</strong></div>
        <button
          class="theme-btn"
          id="theme-btn"
          onclick="toggleTheme()"
          title="Toggle dark mode"
        >
          🌙
        </button>
        <button class="poll-btn" id="poll-btn" onclick="triggerPoll()">
          Poll Now
        </button>
      </div>
    </header>

    <div class="layout">
      <aside>
        <div class="locale-tabs">
          <button class="locale-tab active" data-locale="main-line" onclick="switchLocale('main-line')">PA Main Line</button>
          <button class="locale-tab" data-locale="san-diego" onclick="switchLocale('san-diego')">San Diego</button>
        </div>

        <div class="view-tabs">
          <button
            class="view-tab active"
            id="tab-listings"
            onclick="switchView('listings')"
          >
            Listings
          </button>
          <button class="view-tab" id="tab-map" onclick="switchView('map')">
            Map
          </button>
          <button
            class="view-tab"
            id="tab-inventory"
            onclick="switchView('inventory')"
          >
            Inventory
          </button>
        </div>

        <div id="filters">
          <div class="filter-group">
            <div class="filter-label-row">
              <label>Min Score</label>
              <span class="filter-val" id="f-score-val">0</span>
            </div>
            <input
              type="range"
              id="f-score"
              min="0"
              max="100"
              value="0"
              oninput="
                document.getElementById('f-score-val').textContent = this.value;
                applyFilters();
              "
            />
          </div>

          <div class="filter-group">
            <label>Min Beds</label>
            <select id="f-beds" onchange="applyFilters()">
              <option value="0">Any</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
              <option value="5">5+</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Max Price</label>
            <select id="f-price" onchange="applyFilters()">
              <option value="750000">$750K</option>
              <option value="1000000">$1M</option>
              <option value="1250000">$1.25M</option>
              <option value="1500000">$1.5M</option>
              <option value="1750000">$1.75M</option>
              <option value="2000000">$2M</option>
              <option value="2500000">$2.5M</option>
              <option value="3000000">$3M</option>
              <option value="9999999" selected>No limit</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Property Type</label>
            <select id="f-type" onchange="applyFilters()">
              <option value="">All</option>
              <option value="single family residential">
                Single Family Only
              </option>
              <option value="townhouse">Townhouse</option>
            </select>
          </div>

          <div class="filter-group">
            <label id="area-filter-label">City</label>
            <div class="city-checks" id="city-checks"></div>
          </div>

          <div class="filter-group">
            <label class="toggle-label">
              <input
                type="checkbox"
                id="f-open-house"
                onchange="applyFilters()"
              />
              Open houses only
            </label>
          </div>

          <button class="reset-btn" onclick="resetFilters()">
            Reset Filters
          </button>
        </div>
      </aside>

      <main>
        <div id="view-listings">
          <div class="results-header">
            <h2>Listings</h2>
            <span class="results-count" id="results-count"></span>
          </div>
          <div class="cards" id="cards"></div>
        </div>

        <div id="view-map" class="view-hidden">
          <div class="results-header">
            <h2>Listing Map</h2>
            <span class="results-count" id="map-count"></span>
          </div>
          <div id="listing-map"></div>
        </div>

        <div id="view-inventory" class="view-hidden">
          <div class="chart-section">
            <h2>Inventory Over Time</h2>
            <div class="chart-wrap" style="height:280px"><canvas id="inventory-chart"></canvas></div>
          </div>
          <div class="chart-section">
            <h2>Price Trends by Neighborhood</h2>
            <div class="chart-wrap" style="height:320px"><canvas id="price-trend-chart"></canvas></div>
          </div>
          <div class="chart-section">
            <h2>Score Trends by Neighborhood</h2>
            <div class="chart-wrap" style="height:280px"><canvas id="score-trend-chart"></canvas></div>
          </div>
          <div class="chart-section" id="outcomes-section" style="display:none">
            <h2>Pending Outcomes</h2>
            <div id="outcomes-stats" class="outcomes-stats"></div>
            <div class="chart-wrap" style="height:280px;margin-top:16px"><canvas id="outcomes-chart"></canvas></div>
            <div id="outcomes-list" style="margin-top:20px"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
